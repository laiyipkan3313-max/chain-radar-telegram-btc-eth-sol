name: Telegram 夜更掛單保險

on:
  schedule:
    # 香港時間 23:07、23:22、23:37、23:52；如整個時段被GitHub延誤，00:07、00:22再補發前一晚。
    - cron: "7,22,37,52 15 * * *"
    - cron: "7,22 16 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: telegram-scan
  cancel-in-progress: false

jobs:
  night:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: 下載程式碼
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 設定 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: 產生 BTC／ETH／SOL 夜更掛單
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          AI_MODEL: ${{ vars.AI_MODEL || 'openai/gpt-oss-120b:free' }}
          AI_FALLBACK_MODELS: ${{ vars.AI_FALLBACK_MODELS || 'openrouter/free' }}
          MARKET_DATA_PROVIDER: kraken
        run: node "自動化/GitHub_Telegram掃描.mjs" night

      - name: 保存夜更掛單狀態
        if: always()
        shell: bash
        run: |
          git config user.name "鏈勢雷達機械人"
          git config user.email "actions@users.noreply.github.com"
          git add -f "資料/github自動化狀態.json"
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "更新 Telegram 夜更掛單狀態 [skip ci]"
          git push
