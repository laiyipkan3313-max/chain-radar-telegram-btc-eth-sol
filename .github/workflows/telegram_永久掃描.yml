name: Telegram 永久掃描

on:
  schedule:
    - cron: "*/5 0-14,16-23 * * *"
    - cron: "0,10-55/5 15 * * *"
    - cron: "5 15 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: 執行模式
        required: true
        default: scan
        type: choice
        options:
          - scan
          - night

permissions:
  contents: write

concurrency:
  group: telegram-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: 下載程式碼
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 設定 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: 執行市場掃描
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          AI_MODEL: ${{ vars.AI_MODEL || 'openai/gpt-oss-120b:free' }}
          AI_FALLBACK_MODELS: ${{ vars.AI_FALLBACK_MODELS || 'openrouter/free' }}
        run: |
          MODE="${{ inputs.mode }}"
          if [ -z "$MODE" ]; then MODE="scan"; fi
          if [ "${{ github.event.schedule }}" = "5 15 * * *" ]; then MODE="night"; fi
          node "自動化/GitHub_Telegram掃描.mjs" "$MODE"

      - name: 保存訊號與勝率狀態
        shell: bash
        run: |
          git config user.name "鏈勢雷達機械人"
          git config user.email "actions@users.noreply.github.com"
          git add -f "資料/github自動化狀態.json"
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "更新 Telegram 自動掃描狀態 [skip ci]"
          git push
